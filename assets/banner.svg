<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" rx="16" />

  <!-- Animated Decorative Circles -->
  <circle cx="200" cy="150" r="120" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.3">
    <animate attributeName="r" values="120;140;120" dur="8s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="8s" repeatCount="indefinite" />
  </circle>
  <circle cx="1000" cy="250" r="160" fill="none" stroke="#c084fc" stroke-width="3" opacity="0.2">
    <animate attributeName="r" values="160;130;160" dur="10s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.2;0.4;0.2" dur="10s" repeatCount="indefinite" />
  </circle>

  <!-- Title Text -->
  <text x="50%" y="45%" text-anchor="middle" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-size="56" font-weight="900" fill="url(#textGrad)" filter="url(#glow)">
    RETRIEVAL-BIASED GENERATION
  </text>
  
  <!-- Subtitle Text -->
  <text x="50%" y="60%" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="400" fill="#94a3b8" letter-spacing="4">
    EVOLUTION, VARIANTS, TYPES, &amp; APPLICATIONS
  </text>

  <!-- Grid Lines -->
  <path d="M 0 350 Q 300 300 600 350 T 1200 350" fill="none" stroke="url(#textGrad)" stroke-width="2" opacity="0.4">
    <animate attributeName="d" values="M 0 350 Q 300 300 600 350 T 1200 350; M 0 350 Q 300 400 600 330 T 1200 350; M 0 350 Q 300 300 600 350 T 1200 350" dur="6s" repeatCount="indefinite" />
  </path>
</svg>
